<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📝 Remember — Tasks & Notes (Cloud Sync)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== Welcome / Room screen ===== -->
  <div id="welcomeScreen" class="welcome">
    <div class="welcome-card">
      <div class="welcome-logo">📝</div>
      <h1>Remember</h1>
      <p class="welcome-sub">Tasks &amp; Notes with cloud sync</p>

      <p class="welcome-help">
        Enter a <b>room code</b> (any word you like). Use the
        <b>same code on all your devices</b> to keep them in sync.
      </p>

      <form id="roomForm" class="room-form">
        <input
          type="text"
          id="roomInput"
          class="room-input"
          placeholder="e.g. sachin-2024"
          autocomplete="off"
          required
        />
        <button type="submit" class="btn-add">Join</button>
      </form>
      <p class="welcome-tip">
        💡 Tip: pick something hard to guess (it keeps your data private).
      </p>
    </div>
  </div>

  <!-- ===== Main app ===== -->
  <div id="app" class="app" style="display:none">
    <!-- Header + Search + Sync -->
    <header class="header">
      <div class="header-row">
        <h1 class="title">📝 Remember</h1>
        <button id="syncBtn" class="sync-btn" title="Sync status">
          <span id="syncDot" class="sync-dot saving"></span>
          <span id="syncText" class="sync-text">connecting…</span>
        </button>
      </div>
      <div class="search-wrap">
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search..."
          autocomplete="off"
        />
      </div>
    </header>

    <!-- Add new item -->
    <form id="addForm" class="add-form">
      <input
        type="text"
        id="textInput"
        class="text-input"
        placeholder="Add a task or note..."
        autocomplete="off"
        required
      />
      <input
        type="text"
        id="tagSelect"
        class="select"
        list="tagList"
        placeholder="#tag"
        title="Tag (type your own or pick one)"
        autocomplete="off"
      />
      <datalist id="tagList">
        <option value="work"></option>
        <option value="home"></option>
        <option value="personal"></option>
        <option value="ideas"></option>
      </datalist>
      <select id="typeSelect" class="select" title="Type">
        <option value="task">Task</option>
        <option value="note">Note</option>
      </select>
      <button type="submit" class="btn-add">Add</button>
    </form>

    <!-- Tag filters -->
    <div id="tagFilters" class="tag-filters"></div>

    <!-- Item list -->
    <ul id="itemList" class="item-list"></ul>

    <!-- Empty state -->
    <p id="emptyState" class="empty-state">
      Nothing here yet. Add your first task or note above! 👆
    </p>

    <!-- Footer -->
    <footer class="footer">
      <span id="counter"></span>
      <button id="clearDone" class="link-btn">Clear done</button>
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
